# Server
server.port=5000

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/course_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JdbcTemplate
spring.jdbc.template.fetch-size=-1
spring.jdbc.template.query-timeout=0

# JWT
jwt.secret=CourseManagementSystem2026SuperSecretJwtHmacSha256SigningKey
jwt.expiration=604800000

# SQL init (optional: comment out to manage schema manually)
spring.sql.init.mode=never

# JSON Serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss